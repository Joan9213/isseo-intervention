<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISSEO — Rapport d'Intervention</title>
<style>
  :root {
    --orange: #E97300;
    --orange2: #FF6A07;
    --teal: #41B5A3;
    --grey: #656565;
    --light: #F7F7F7;
    --white: #FFFFFF;
    --border: #E0E0E0;
    --text: #1A1A1A;
    --success: #2ECC71;
    --danger: #E74C3C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--light);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--white);
    border-bottom: 3px solid var(--orange);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-badge {
    background: var(--orange);
    color: white;
    font-weight: 800;
    font-size: 18px;
    padding: 6px 12px;
    border-radius: 6px;
    letter-spacing: 1px;
  }
  .logo-sub {
    font-size: 11px;
    color: var(--grey);
    line-height: 1.3;
  }
  .logo-sub strong { color: var(--teal); font-size: 13px; }

  /* SYNC STATUS */
  .sync-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--grey);
  }
  .sync-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ccc;
  }
  .sync-dot.online { background: var(--success); }
  .sync-dot.syncing { background: var(--orange); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .tab {
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--grey);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .tab.active {
    color: var(--orange);
    border-bottom-color: var(--orange);
  }
  .tab:hover { color: var(--orange); }

  /* CONTENT */
  .content { padding: 16px; max-width: 700px; margin: 0 auto; }

  /* FORM CARD */
  .card {
    background: var(--white);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
  }
  .card-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--teal);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--grey);
    margin-bottom: 4px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--white);
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--teal);
  }
  .field textarea { min-height: 80px; resize: vertical; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* PIECES */
  .piece-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr auto;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .piece-row input {
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
  }
  .btn-del {
    background: none;
    border: none;
    color: var(--danger);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
  }
  .btn-add {
    background: none;
    border: 1.5px dashed var(--teal);
    color: var(--teal);
    padding: 8px 14px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
  }
  .btn-add:hover { background: rgba(65,181,163,0.08); }

  /* SIGNATURE */
  .sig-wrap {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: #fafafa;
  }
  .sig-label {
    font-size: 11px;
    color: var(--grey);
    padding: 6px 10px;
    background: var(--light);
    border-bottom: 1px solid var(--border);
  }
  canvas {
    display: block;
    width: 100%;
    height: 120px;
    touch-action: none;
    cursor: crosshair;
  }
  .sig-actions {
    display: flex;
    gap: 8px;
    padding: 6px 10px;
    background: var(--light);
    border-top: 1px solid var(--border);
  }
  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--grey);
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 12px;
    cursor: pointer;
  }

  /* BUTTONS */
  .btn-primary {
    background: var(--orange);
    color: white;
    border: none;
    padding: 13px 20px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--orange2); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

  .btn-secondary {
    background: var(--teal);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-secondary:hover { opacity: 0.85; }

  /* LISTE OT */
  .ot-list { display: flex; flex-direction: column; gap: 10px; }
  .ot-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: box-shadow 0.2s;
    border-left: 4px solid var(--teal);
  }
  .ot-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.1); }
  .ot-card.brouillon { border-left-color: var(--orange); }
  .ot-card.cloturee { border-left-color: var(--success); }
  .ot-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .ot-num { font-weight: 700; font-size: 15px; }
  .ot-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--light);
    color: var(--grey);
    text-transform: uppercase;
  }
  .ot-badge.brouillon { background: #FFF3E0; color: var(--orange); }
  .ot-badge.cloturee { background: #E8F8F0; color: var(--success); }
  .ot-info { font-size: 13px; color: var(--grey); }
  .ot-info strong { color: var(--text); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--grey);
    font-size: 14px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--grey);
  }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }

  /* DETAIL VIEW */
  .detail-field {
    margin-bottom: 10px;
  }
  .detail-field .dl { font-size: 11px; font-weight: 700; color: var(--grey); text-transform: uppercase; }
  .detail-field .dv { font-size: 14px; color: var(--text); margin-top: 2px; }

  .btn-back {
    background: none;
    border: none;
    color: var(--teal);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 14px;
    padding: 0;
  }

  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }

  @media print {
    header, .tabs, .action-row, .btn-back { display: none !important; }
    .card { border: 1px solid #ddd; break-inside: avoid; }
    body { background: white; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-badge">ISSEO</div>
    <div class="logo-sub">
      <strong>Rapports d'Intervention</strong><br>
      Chariots Élévateurs · Arles
    </div>
  </div>
  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel">—</span>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('nouveau')">＋ Nouveau</div>
  <div class="tab" onclick="showTab('liste')">📋 Mes OT</div>
</div>

<div class="content" id="tabNouveau">

  <div class="card">
    <div class="card-title">Identification</div>
    <div class="row2">
      <div class="field">
        <label>N° OT *</label>
        <input type="text" id="numero_ot" placeholder="OT-2026-001">
      </div>
      <div class="field">
        <label>Date *</label>
        <input type="date" id="date_intervention">
      </div>
    </div>
    <div class="field">
      <label>Technicien *</label>
      <select id="technicien">
        <option value="">— Sélectionner —</option>
        <option>Florent CUZIN</option>
        <option>Cédric</option>
        <option>Joan ISLA</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Client & Machine</div>
    <div class="field">
      <label>Client *</label>
      <input type="text" id="client" placeholder="Nom du client">
    </div>
    <div class="row2">
      <div class="field">
        <label>Machine</label>
        <input type="text" id="machine" placeholder="Ex: Hangcha XF25">
      </div>
      <div class="field">
        <label>N° Série</label>
        <input type="text" id="numero_serie" placeholder="Série">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Intervention</div>
    <div class="field">
      <label>Type</label>
      <select id="type_intervention">
        <option value="">— Type —</option>
        <option>Maintenance préventive</option>
        <option>Panne / Réparation</option>
        <option>VGP</option>
        <option>Mise en service</option>
        <option>Garantie</option>
        <option>Full Service</option>
        <option>Démonstration</option>
      </select>
    </div>
    <div class="field">
      <label>Description des travaux *</label>
      <textarea id="description" placeholder="Décrivez les travaux effectués..."></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Pièces utilisées</div>
    <div id="piecesList"></div>
    <button class="btn-add" onclick="ajouterPiece()">+ Ajouter une pièce</button>
  </div>

  <div class="card">
    <div class="card-title">Signatures</div>
    <div style="margin-bottom:12px;">
      <div class="sig-wrap">
        <div class="sig-label">Signature technicien</div>
        <canvas id="canvasTech" width="600" height="120"></canvas>
        <div class="sig-actions">
          <button class="btn-clear" onclick="clearSig('canvasTech')">Effacer</button>
        </div>
      </div>
    </div>
    <div class="sig-wrap">
      <div class="sig-label">Signature client (bon pour accord)</div>
      <canvas id="canvasClient" width="600" height="120"></canvas>
      <div class="sig-actions">
        <button class="btn-clear" onclick="clearSig('canvasClient')">Effacer</button>
      </div>
    </div>
  </div>

  <div style="margin-bottom:30px;">
    <button class="btn-primary" id="btnSauvegarder" onclick="sauvegarder('brouillon')">
      💾 Sauvegarder (brouillon)
    </button>
    <div style="height:10px;"></div>
    <button class="btn-primary" style="background:var(--teal);" onclick="sauvegarder('cloturee')">
      ✅ Clôturer & Envoyer
    </button>
  </div>

</div>

<div class="content" id="tabListe" style="display:none;">
  <div id="listeContent">
    <div class="loading"><div class="spinner"></div>Chargement...</div>
  </div>
</div>

<div class="content" id="tabDetail" style="display:none;"></div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://svcaftiobsuihzlzuiup.supabase.co';
const SUPABASE_KEY = 'sb_publishable_GDR1lYEFLlGALjfdCgU6VQ_YSVBbUuc';

// ─── SYNC STATUS ───────────────────────────────────────
function setSyncStatus(state, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = label;
}

// ─── API SUPABASE ───────────────────────────────────────
async function sbFetch(method, path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  return res.status === 204 ? null : res.json();
}

// ─── TOAST ───────────────────────────────────────────────
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

// ─── TABS ────────────────────────────────────────────────
function showTab(tab) {
  document.getElementById('tabNouveau').style.display = 'none';
  document.getElementById('tabListe').style.display = 'none';
  document.getElementById('tabDetail').style.display = 'none';
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (tab==='nouveau'&&i===0)||(tab==='liste'&&i===1));
  });
  if (tab === 'nouveau') {
    document.getElementById('tabNouveau').style.display = '';
  } else if (tab === 'liste') {
    document.getElementById('tabListe').style.display = '';
    chargerListe();
  } else if (tab === 'detail') {
    document.getElementById('tabDetail').style.display = '';
  }
}

// ─── PIECES ──────────────────────────────────────────────
let pieces = [];
function ajouterPiece() {
  pieces.push({ ref:'', designation:'', qte:1 });
  renderPieces();
}
function renderPieces() {
  const c = document.getElementById('piecesList');
  c.innerHTML = pieces.map((p,i) => `
    <div class="piece-row">
      <input placeholder="Référence" value="${p.ref}" oninput="pieces[${i}].ref=this.value">
      <input placeholder="Désignation" value="${p.designation}" oninput="pieces[${i}].designation=this.value">
      <input type="number" placeholder="Qté" value="${p.qte}" min="1" oninput="pieces[${i}].qte=parseInt(this.value)||1">
      <button class="btn-del" onclick="pieces.splice(${i},1);renderPieces()">✕</button>
    </div>
  `).join('');
}

// ─── SIGNATURE ───────────────────────────────────────────
function initCanvas(id) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#1A1A1A';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  let drawing = false;

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - r.left) * (canvas.width / r.width),
      y: (src.clientY - r.top) * (canvas.height / r.height)
    };
  }
  canvas.addEventListener('mousedown', e => { drawing=true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x,p.y); });
  canvas.addEventListener('mousemove', e => { if(!drawing)return; const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); });
  canvas.addEventListener('mouseup', ()=>drawing=false);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x,p.y); }, {passive:false});
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if(!drawing)return; const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); }, {passive:false});
  canvas.addEventListener('touchend', ()=>drawing=false);
}

function clearSig(id) {
  const c = document.getElementById(id);
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

function getSig(id) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  const data = ctx.getImageData(0,0,c.width,c.height).data;
  const hasContent = Array.from(data).some((v,i)=>i%4===3&&v>0);
  return hasContent ? c.toDataURL() : null;
}

// ─── SAUVEGARDER ─────────────────────────────────────────
async function sauvegarder(statut) {
  const numero_ot = document.getElementById('numero_ot').value.trim();
  const client = document.getElementById('client').value.trim();
  const description = document.getElementById('description').value.trim();
  const technicien = document.getElementById('technicien').value;

  if (!numero_ot || !client || !description || !technicien) {
    showToast('⚠️ Remplissez les champs obligatoires (*)', 'error');
    return;
  }

  const btn = document.getElementById('btnSauvegarder');
  btn.disabled = true;
  setSyncStatus('syncing', 'Enregistrement...');

  const payload = {
    numero_ot,
    date_intervention: document.getElementById('date_intervention').value || null,
    technicien,
    client,
    machine: document.getElementById('machine').value.trim() || null,
    numero_serie: document.getElementById('numero_serie').value.trim() || null,
    type_intervention: document.getElementById('type_intervention').value || null,
    description,
    pieces_utilisees: pieces.length > 0 ? pieces : null,
    signature_tech: getSig('canvasTech'),
    signature_client: getSig('canvasClient'),
    statut
  };

  try {
    await sbFetch('POST', 'interventions', payload);
    setSyncStatus('online', 'Synchronisé ✓');
    showToast(statut === 'cloturee' ? '✅ Rapport clôturé !' : '💾 Brouillon sauvegardé !', 'success');
    if (statut === 'cloturee') resetForm();
  } catch(e) {
    setSyncStatus('error', 'Erreur sync');
    showToast('❌ Erreur : ' + e.message, 'error');
    console.error(e);
  }
  btn.disabled = false;
}

function resetForm() {
  ['numero_ot','client','machine','numero_serie','description'].forEach(id => document.getElementById(id).value='');
  document.getElementById('technicien').value='';
  document.getElementById('type_intervention').value='';
  document.getElementById('date_intervention').value='';
  pieces = [];
  renderPieces();
  clearSig('canvasTech');
  clearSig('canvasClient');
}

// ─── LISTE ───────────────────────────────────────────────
async function chargerListe() {
  document.getElementById('listeContent').innerHTML = '<div class="loading"><div class="spinner"></div>Chargement...</div>';
  setSyncStatus('syncing', 'Chargement...');
  try {
    const data = await sbFetch('GET', 'interventions?order=created_at.desc&limit=50');
    setSyncStatus('online', 'Synchronisé ✓');
    if (!data || data.length === 0) {
      document.getElementById('listeContent').innerHTML = `
        <div class="empty">
          <div class="empty-icon">📋</div>
          Aucun rapport pour l'instant.<br>Créez votre premier OT !
        </div>`;
      return;
    }
    document.getElementById('listeContent').innerHTML = `
      <div class="ot-list">
        ${data.map(ot => `
          <div class="ot-card ${ot.statut}" onclick="afficherDetail('${ot.id}')">
            <div class="ot-head">
              <span class="ot-num">${ot.numero_ot || '—'}</span>
              <span class="ot-badge ${ot.statut}">${ot.statut}</span>
            </div>
            <div class="ot-info">
              <strong>${ot.client || '—'}</strong> · ${ot.machine || 'Machine non précisée'}<br>
              ${ot.technicien || '—'} · ${ot.date_intervention ? new Date(ot.date_intervention).toLocaleDateString('fr-FR') : '—'}
            </div>
          </div>
        `).join('')}
      </div>`;
  } catch(e) {
    setSyncStatus('error', 'Erreur');
    document.getElementById('listeContent').innerHTML = `<div class="empty">❌ Erreur de chargement<br><small>${e.message}</small></div>`;
  }
}

// ─── DETAIL ──────────────────────────────────────────────
async function afficherDetail(id) {
  showTab('detail');
  document.getElementById('tabDetail').innerHTML = '<div class="loading"><div class="spinner"></div>Chargement...</div>';
  try {
    const data = await sbFetch('GET', `interventions?id=eq.${id}`);
    const ot = data[0];
    const d = document.getElementById('tabDetail');
    d.innerHTML = `
      <button class="btn-back" onclick="showTab('liste')">← Retour</button>
      <div class="card">
        <div class="card-title">OT ${ot.numero_ot || '—'} · <span style="color:var(--orange)">${ot.statut}</span></div>
        <div class="row2">
          <div class="detail-field"><div class="dl">Technicien</div><div class="dv">${ot.technicien||'—'}</div></div>
          <div class="detail-field"><div class="dl">Date</div><div class="dv">${ot.date_intervention ? new Date(ot.date_intervention).toLocaleDateString('fr-FR') : '—'}</div></div>
        </div>
        <div class="detail-field"><div class="dl">Client</div><div class="dv">${ot.client||'—'}</div></div>
        <div class="row2">
          <div class="detail-field"><div class="dl">Machine</div><div class="dv">${ot.machine||'—'}</div></div>
          <div class="detail-field"><div class="dl">N° Série</div><div class="dv">${ot.numero_serie||'—'}</div></div>
        </div>
        <div class="detail-field"><div class="dl">Type</div><div class="dv">${ot.type_intervention||'—'}</div></div>
        <div class="detail-field"><div class="dl">Description</div><div class="dv" style="white-space:pre-wrap">${ot.description||'—'}</div></div>
      </div>

      ${ot.pieces_utilisees && ot.pieces_utilisees.length > 0 ? `
      <div class="card">
        <div class="card-title">Pièces utilisées</div>
        <table style="width:100%;font-size:13px;border-collapse:collapse;">
          <tr style="color:var(--grey);font-size:11px;font-weight:700;">
            <td style="padding:6px 0;">Référence</td>
            <td>Désignation</td>
            <td style="text-align:right;">Qté</td>
          </tr>
          ${ot.pieces_utilisees.map(p=>`
            <tr style="border-top:1px solid var(--border);">
              <td style="padding:8px 0;">${p.ref||'—'}</td>
              <td>${p.designation||'—'}</td>
              <td style="text-align:right;">${p.qte}</td>
            </tr>
          `).join('')}
        </table>
      </div>` : ''}

      ${ot.signature_tech || ot.signature_client ? `
      <div class="card">
        <div class="card-title">Signatures</div>
        ${ot.signature_tech ? `<div style="margin-bottom:10px;"><div class="dl" style="font-size:11px;color:var(--grey);margin-bottom:4px;">TECHNICIEN</div><img src="${ot.signature_tech}" style="max-width:100%;border:1px solid var(--border);border-radius:6px;"></div>` : ''}
        ${ot.signature_client ? `<div><div class="dl" style="font-size:11px;color:var(--grey);margin-bottom:4px;">CLIENT</div><img src="${ot.signature_client}" style="max-width:100%;border:1px solid var(--border);border-radius:6px;"></div>` : ''}
      </div>` : ''}

      <div class="action-row">
        <button class="btn-secondary" onclick="window.print()">🖨️ Imprimer</button>
        ${ot.statut !== 'cloturee' ? `<button class="btn-primary" onclick="cloturerOT('${ot.id}')">✅ Clôturer</button>` : '<div></div>'}
      </div>
      <div style="height:30px;"></div>
    `;
  } catch(e) {
    document.getElementById('tabDetail').innerHTML = `<div class="empty">❌ Erreur<br><small>${e.message}</small></div>`;
  }
}

async function cloturerOT(id) {
  try {
    await sbFetch('PATCH', `interventions?id=eq.${id}`, { statut: 'cloturee' });
    showToast('✅ OT clôturé !', 'success');
    afficherDetail(id);
  } catch(e) {
    showToast('❌ ' + e.message, 'error');
  }
}

// ─── INIT ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Date du jour par défaut
  document.getElementById('date_intervention').valueAsDate = new Date();
  initCanvas('canvasTech');
  initCanvas('canvasClient');
  // Test connexion Supabase
  setSyncStatus('syncing', 'Connexion...');
  sbFetch('GET', 'interventions?limit=1')
    .then(() => setSyncStatus('online', 'Connecté ✓'))
    .catch(() => setSyncStatus('error', 'Hors ligne'));
});
</script>
</body>
</html>
